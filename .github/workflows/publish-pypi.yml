name: Publish to PyPI

# Fires on a GitHub Release (tag vX.XX.XXX). Uses PyPI Trusted Publishing (OIDC) — no stored token.
# Requires the pending publisher registered on PyPI: project minehaulsim, owner fsantibanezleal,
# repo CAOS_MINEHAUL, workflow publish-pypi.yml, environment pypi.
on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          pip install build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
