name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Tests
        run: pytest

  guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Repo-integrity guards
        run: |
          fail=0
          if git ls-files | grep -qE '(^|/)\.env(\..+)?$' && ! git ls-files | grep -qx '.env.example'; then
            echo "::error::a real .env is tracked"; fail=1; fi
          if git ls-files | grep -qiE '(^|/)\.?venv|\.(dll|so|dylib|pt|pth|parquet|h5)$'; then
            echo "::error::a venv or heavy binary is tracked"; fail=1; fi
          if git grep -nF 'D:\_Repos' -- . ':!.github' >/dev/null 2>&1; then
            echo "::error::leaked local machine path"; fail=1; fi
          if [ "$fail" -eq 0 ]; then echo "guards OK"; fi
          exit $fail
